<!DOCTYPE html>
<html>
<head>
  <title>Puter Sign-In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 24px;
      background: linear-gradient(180deg, #f7fbff 0%, #edf4fa 100%);
      color: #1f2933;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d7e5f3;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 14px 36px rgba(11, 92, 171, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #0b5cab;
    }

    p {
      line-height: 1.6;
    }

    button {
      background-color: #0b74de;
      color: white;
      padding: 12px 16px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background-color: #095fb3;
    }

    #status {
      margin-top: 16px;
      min-height: 20px;
      color: #44515c;
    }

    #accountBox {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f8fc;
      border: 1px solid #dbe7f2;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connect Puter</h1>
    <p>This extension now uses your Puter account for AI requests instead of a manually entered provider API key.</p>
    <button id="signInButton">Sign In With Puter</button>
    <button id="closeButton">Close</button>
    <div id="status"></div>
    <div id="accountBox"></div>
  </div>

  <script src="vendor/puter.js"></script>
  <script src="auth.js"></script>
</body>
</html>
